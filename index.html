<!DOCTYPE html>
<html>
<head>
    <title>Grade Calculator</title>
</head>
<body>
    <h2>Student Grade Calculator</h2>

    <input type="number" id="marks" placeholder="Enter Marks">
    <button onclick="calculateGrade()">Calculate</button>

    <h3 id="result"></h3>

    <script>
        function calculateGrade() {
            let marks = parseFloat(document.getElementById("marks").value);
            let grade;

            if (marks >= 90) {
                grade = "A";
            } else if (marks >= 80) {
                grade = "B";
            } else if (marks >= 70) {
                grade = "C";
            } else if (marks >= 60) {
                grade = "D";
            } else {
                grade = "F";
            }

            document.getElementById("result").innerHTML =
                "Your Grade is: " + grade;
        }
    </script>
</body>
</html>
